services:
  frontend-mock:
    profiles: ["frontend-mock"]
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      target: development
    environment:
      VITE_DATA_MODE: ${VITE_DATA_MODE:-mock}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/workspace/src/frontend
      - frontend-node-modules:/workspace/src/frontend/node_modules

  frontend-api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      target: development
    environment:
      VITE_DATA_MODE: api
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./src/frontend:/workspace/src/frontend
      - frontend-node-modules:/workspace/src/frontend/node_modules

  backend:
    profiles: ["full"]
    build:
      context: .
      dockerfile: src/backend/Dockerfile
      target: development
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORT: ${ASPNETCORE_HTTP_PORT:-8080}
      GeoExplorer__UsePostgresCatalog: "true"
      GeoExplorer__UsePostgresPersistence: "true"
      GeoExplorer__AllowedOrigins: ${GeoExplorer__AllowedOrigins:-http://localhost:5173;http://127.0.0.1:5173}
      ConnectionStrings__GeoExplorerDb: Host=db;Port=5432;Database=${POSTGRES_DB:-geoexplorer};Username=${POSTGRES_USER:-geoexplorer};Password=${POSTGRES_PASSWORD:-geoexplorer_dev}
      MAPILLARY_ACCESS_TOKEN: ${MAPILLARY_ACCESS_TOKEN:-}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./src/backend:/workspace/src/backend
      - ./src/database:/workspace/src/database

  db:
    profiles: ["database", "full"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geoexplorer}
      POSTGRES_USER: ${POSTGRES_USER:-geoexplorer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoexplorer_dev}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  frontend-node-modules:
  postgres-data:
